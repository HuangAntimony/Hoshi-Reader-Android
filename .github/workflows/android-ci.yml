name: Android CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANDROID_NDK_VERSION: 28.2.13676358
      ANDROID_CMAKE_VERSION: 3.22.1

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git
            ~/.cargo/registry
            app/src/main/rust/hoshiepub/target
          key: cargo-${{ runner.os }}-${{ hashFiles('app/src/main/rust/hoshiepub/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36.1" \
            "build-tools;36.0.0" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build, lint, and unit test
        run: ./gradlew check --console=plain --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --console=plain --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hoshi-reader-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
